<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>FIFA FanZone</title>
  </head>
  <body>
    <script>
      // GitHub Pages SPA redirect receiver — restores the real path
      // from the query param set by 404.html before React mounts.
      (function () {
        var base = '/fifa-fan-zone'
        var p = new URLSearchParams(location.search).get('p')
        if (p) {
          history.replaceState(null, '', base + p)
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
