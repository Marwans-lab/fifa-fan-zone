<div
  [class]="rootClassName"
  data-component="fan-card"
  role="button"
  [attr.aria-label]="isFlipped ? 'Fan card back' : 'Fan card – tap to flip'"
  (click)="onCardClick()"
>
  <div class="f-fan-card__inner">
    <div
      class="f-fan-card__front"
      data-section="front-face"
      #frontFace
      [ngStyle]="frontStyle"
    >
      <div class="f-fan-card__texture-dots"></div>
      <div class="f-fan-card__texture-stripes"></div>
      <div class="f-fan-card__holographic"></div>

      <img
        *ngIf="fanCard.photoDataUrl"
        [src]="fanCard.photoDataUrl"
        alt=""
        aria-hidden="true"
        [ngStyle]="frontPhotoStyle"
      />

      <div class="f-fan-card__team-badge" data-section="team">
        <div *ngIf="!fanCard.teamId" class="f-fan-card__team-empty">No team selected</div>
      </div>

      <div class="f-fan-card__flip-hint">
        <span class="f-fan-card__flip-hint-icon" aria-hidden="true"></span>
        <span class="f-fan-card__flip-hint-text">Tap card to flip</span>
      </div>
    </div>

    <div class="f-fan-card__back" data-section="back-face" (click)="onBackFaceClick()">
      <div class="f-fan-card__holographic"></div>

      <div class="f-fan-card__back-header">
        <div class="f-fan-card__back-title">Fan profile</div>
      </div>

      <div class="f-fan-card__wizard" *ngIf="wizardActive; else nonWizardContent" (click)="stopPropagation($event)">
        <div class="f-fan-card__wizard-progress">
          <div
            *ngFor="let _ of profileQuestions; index as i"
            [class]="i <= step ? 'f-fan-card__wizard-bar f-fan-card__wizard-bar--active' : 'f-fan-card__wizard-bar'"
          ></div>
        </div>

        <div class="f-fan-card__wizard-question">
          {{ currentQuestion.label }}
        </div>

        <div class="f-fan-card__wizard-options">
          <button
            *ngFor="let option of currentQuestion.options"
            type="button"
            [class]="currentAnswer === option ? 'f-fan-card__wizard-option f-fan-card__wizard-option--selected' : 'f-fan-card__wizard-option'"
            (click)="selectAnswer(currentQuestion.id, option, $event)"
          >
            {{ option }}
          </button>
        </div>

        <div class="f-fan-card__wizard-nav">
          <app-button
            variant="secondary"
            [className]="'f-fan-card__wizard-btn--back'"
            (pressed)="back($event)"
          >
            Back
          </app-button>
          <app-button
            [className]="'f-fan-card__wizard-btn--next'"
            [disabled]="!currentAnswer"
            (pressed)="next($event)"
          >
            <span class="f-fan-card__wizard-btn-content">{{ isLastStep ? 'Save' : 'Next' }}</span>
          </app-button>
        </div>
      </div>

      <ng-template #nonWizardContent>
        <div class="f-fan-card__profile" *ngIf="isComplete; else ctaContent">
          <div *ngFor="let question of profileQuestions" class="f-fan-card__profile-row">
            <img
              [src]="question.iconSrc"
              width="24"
              height="24"
              alt=""
              class="f-fan-card__profile-icon"
            />
            <div class="f-fan-card__profile-text">
              <div class="f-fan-card__profile-category">{{ question.category }}</div>
              <div class="f-fan-card__profile-answer">{{ resolveAnswer(question.id) }}</div>
            </div>
          </div>
        </div>

        <ng-template #ctaContent>
          <div class="f-fan-card__cta" (click)="stopPropagation($event)">
            <button class="f-fan-card__cta-button" type="button" (click)="startWizard($event)">
              Complete your card
            </button>
          </div>
        </ng-template>
      </ng-template>

      <div
        *ngIf="isComplete && !wizardActive"
        class="f-fan-card__actions"
        data-section="action-circles"
        (click)="stopPropagation($event)"
      >
        <button class="f-fan-card__action" type="button" data-ui="edit-btn" (click)="edit($event)">
          <div class="f-fan-card__action-circle">
            <span class="fan-card-edit-icon" aria-hidden="true"></span>
          </div>
          <span class="f-fan-card__action-label">Edit</span>
        </button>
        <button class="f-fan-card__action" type="button" data-ui="share-btn" (click)="shareCard($event)">
          <div class="f-fan-card__action-circle">
            <span class="fan-card-share-icon" aria-hidden="true"></span>
          </div>
          <span class="f-fan-card__action-label">Share</span>
        </button>
        <button class="f-fan-card__action" type="button" data-ui="save-btn" (click)="saveCard($event)">
          <div class="f-fan-card__action-circle">
            <span class="fan-card-save-to-device-icon" aria-hidden="true"></span>
          </div>
          <span class="f-fan-card__action-label">Save</span>
        </button>
      </div>

      <div class="f-fan-card__back-flip-hint">
        <span class="f-fan-card__back-flip-hint-icon" aria-hidden="true"></span>
        Tap card to flip
      </div>
    </div>
  </div>
</div>
