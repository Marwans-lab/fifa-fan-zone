<div
  [class]="rootClassName"
  data-component="fan-card"
  role="button"
  [attr.aria-label]="isFlipped ? 'Fan card back' : 'Fan card - tap to flip'"
  (click)="onRootClick()"
>
  <div class="f-fan-card__inner">
    <div
      class="f-fan-card__front"
      data-section="front-face"
      #frontFace
      [ngStyle]="frontInlineStyle"
    >
      <div class="f-fan-card__texture-dots"></div>
      <div class="f-fan-card__texture-stripes"></div>
      <div class="f-fan-card__holographic"></div>

      <img
        *ngIf="fanCard.photoDataUrl"
        [src]="fanCard.photoDataUrl ?? ''"
        alt=""
        aria-hidden="true"
        style="position: absolute; bottom: 0; left: 0; width: 100%; height: auto; z-index: 0; pointer-events: none; display: block;"
      />

      <div class="f-fan-card__team-badge" data-section="team">
        <div *ngIf="!fanCard.teamId" class="f-fan-card__team-empty">
          No team selected
        </div>
      </div>

      <div class="f-fan-card__flip-hint">
        <span class="f-fan-card__flip-hint-icon" aria-hidden="true"></span>
        <span class="f-fan-card__flip-hint-text">Tap card to flip</span>
      </div>
    </div>

    <div class="f-fan-card__back" data-section="back-face" (click)="onBackFaceClick($event)">
      <div class="f-fan-card__holographic"></div>

      <div class="f-fan-card__back-header">
        <div class="f-fan-card__back-title">
          Fan profile
        </div>
      </div>

      <div *ngIf="wizardActive; else wizardInactive" class="f-fan-card__wizard" (click)="stopPropagation($event)">
        <div class="f-fan-card__wizard-progress">
          <div
            *ngFor="let _question of profileQuestions; let i = index"
            [class]="'f-fan-card__wizard-bar' + (i <= step ? ' f-fan-card__wizard-bar--active' : '')"
          ></div>
        </div>

        <div class="f-fan-card__wizard-question">
          {{ currentQuestion.label }}
        </div>

        <div class="f-fan-card__wizard-options">
          <button
            *ngFor="let option of currentQuestion.options"
            [class]="'f-fan-card__wizard-option' + (currentAnswer === option ? ' f-fan-card__wizard-option--selected' : '')"
            (click)="onWizardOptionClick($event, currentQuestion.id, option)"
          >
            {{ option }}
          </button>
        </div>

        <div class="f-fan-card__wizard-nav">
          <ffz-button
            variant="secondary"
            className="f-fan-card__wizard-btn--back"
            (buttonClick)="handleBack($event)"
          >
            Back
          </ffz-button>
          <ffz-button
            className="f-fan-card__wizard-btn--next"
            [disabled]="!currentAnswer"
            (buttonClick)="handleNext($event)"
          >
            <span class="f-fan-card__wizard-btn-content">
              {{ isLastQuestion ? 'Save' : 'Next' }}
            </span>
          </ffz-button>
        </div>
      </div>

      <ng-template #wizardInactive>
        <div *ngIf="isComplete; else emptyState" class="f-fan-card__profile">
          <div *ngFor="let question of profileQuestions" class="f-fan-card__profile-row">
            <img [src]="question.iconSrc" width="24" height="24" alt="" class="f-fan-card__profile-icon" />
            <div class="f-fan-card__profile-text">
              <div class="f-fan-card__profile-category">
                {{ question.category }}
              </div>
              <div class="f-fan-card__profile-answer">
                {{ resolvedAnswer(question.id) }}
              </div>
            </div>
          </div>
        </div>
      </ng-template>

      <ng-template #emptyState>
        <div class="f-fan-card__cta" (click)="stopPropagation($event)">
          <button class="f-fan-card__cta-button" type="button" (click)="startWizard($event)">
            Complete your card
          </button>
        </div>
      </ng-template>

      <div
        *ngIf="isComplete && !wizardActive"
        class="f-fan-card__actions"
        data-section="action-circles"
        (click)="stopPropagation($event)"
      >
        <button class="f-fan-card__action" type="button" data-ui="edit-btn" (click)="handleEditTap($event)">
          <div class="f-fan-card__action-circle">
            <span class="fan-card-edit-icon" aria-hidden="true"></span>
          </div>
          <span class="f-fan-card__action-label">Edit</span>
        </button>
        <button class="f-fan-card__action" type="button" data-ui="share-btn" (click)="handleShareTap($event)">
          <div class="f-fan-card__action-circle">
            <span class="fan-card-share-icon" aria-hidden="true"></span>
          </div>
          <span class="f-fan-card__action-label">Share</span>
        </button>
        <button class="f-fan-card__action" type="button" data-ui="save-btn" (click)="handleSaveTap($event)">
          <div class="f-fan-card__action-circle">
            <span class="fan-card-save-to-device-icon" aria-hidden="true"></span>
          </div>
          <span class="f-fan-card__action-label">Save</span>
        </button>
      </div>

      <div class="f-fan-card__back-flip-hint">
        <span class="f-fan-card__back-flip-hint-icon" aria-hidden="true"></span>
        Tap card to flip
      </div>
    </div>
  </div>
</div>
