<div class="swipe-page page-in" data-page="swipe-quiz">
  <header class="swipe-header">
    <button type="button" class="back-btn" data-ui="back-btn" (click)="onBack()" aria-label="Go back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path
          d="M15 19l-7-7 7-7"
          stroke="var(--f-brand-color-text-default)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <h1>{{ quiz().title }}</h1>
    <div class="score">{{ score() }}/{{ total() }}</div>
  </header>

  <div class="progress">
    @for (item of results(); track $index; let i = $index) {
      <div class="dot" [class.dot--current]="i === currentIdx()" [class.dot--ok]="item === true" [class.dot--bad]="item === false"></div>
    }
  </div>

  <main class="statement-card glass">
    <p>{{ currentStatement().statement }}</p>
  </main>

  <footer class="actions">
    <button type="button" class="btn btn-secondary" (click)="answer(false)">False</button>
    <button type="button" class="btn btn-primary" (click)="answer(true)">True</button>
  </footer>
</div>
