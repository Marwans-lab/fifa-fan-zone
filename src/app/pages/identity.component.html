@if (!hasPreview()) {
  <div class="identity-page" data-page="identity">
    <div class="identity-header" data-section="header">
      <h2 class="identity-heading">Choose your team</h2>
      <p class="identity-subheading">Select the country you're supporting</p>
    </div>

    <div class="identity-search" data-section="search">
      <input
        class="identity-search-input"
        data-ui="team-search-input"
        type="text"
        placeholder="Search teams..."
        [value]="query()"
        (input)="onQueryChange($event)"
      />
    </div>

    <div class="identity-team-list" data-section="team-grid">
      @for (team of filteredTeams(); track team.id) {
        <button type="button" class="identity-team-btn" data-ui="team-option-btn" (click)="onTeamSelect(team.id)">
          <div
            class="identity-team-swatch"
            [style.background]="'linear-gradient(135deg, ' + team.colors[0] + ', ' + team.colors[1] + ')'"
          >
            {{ team.flag }}
          </div>
          <span class="identity-team-name">{{ team.name }}</span>
          <span class="identity-team-chevron" aria-hidden="true">›</span>
        </button>
      }
    </div>
  </div>
} @else {
  <div class="identity-page" data-page="identity">
    <div class="identity-preview-page">
      <h2 class="identity-preview-heading">Looking good!</h2>
      <p class="identity-preview-subheading">Your fan card is ready</p>

      <section class="identity-card-preview" data-section="card-preview">
        <div class="identity-card-preview-avatar">
          @if (photoDataUrl()) {
            <img [src]="photoDataUrl()!" alt="Your photo" />
          } @else {
            <span>{{ selectedTeam()?.flag ?? '⚽' }}</span>
          }
        </div>
        <h3>{{ selectedTeam()?.name ?? 'Your team' }}</h3>
      </section>

      <div class="identity-preview-actions">
        <button type="button" class="identity-btn identity-btn--primary" data-ui="save-fan-card-btn" (click)="onConfirm()">
          Save fan card
        </button>
        <button type="button" class="identity-btn identity-btn--secondary" data-ui="retake-photo-btn" (click)="onRetake()">
          Retake photo
        </button>
      </div>
    </div>
  </div>
}
