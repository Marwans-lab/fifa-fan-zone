<div class="quiz-page page-in" data-page="quiz">
  <div class="quiz-header" data-section="header">
    <button class="quiz-close-btn" type="button" data-ui="back-btn" (click)="onBack()" aria-label="Close quiz">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M3 3l10 10M13 3L3 13" stroke="var(--c-lt-text-1)" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
    <div class="quiz-progress-track">
      <div class="quiz-progress-fill" [style.width.%]="progressPercent()"></div>
    </div>
  </div>

  <div class="quiz-title">{{ quiz().title }}</div>

  @if (questionOrNull(); as currentQuestion) {
    <div class="quiz-question">{{ currentQuestion.question }}</div>

    <div class="quiz-options">
      @for (option of currentQuestion.options; track option.id; let i = $index) {
        <button
          class="quiz-option"
          type="button"
          data-ui="answer-option-btn"
          [disabled]="revealed()"
          [class.quiz-option--selected]="selectedOptionId() === option.id && !revealed()"
          [class.quiz-option--correct]="revealed() && option.id === currentQuestion.correctId"
          [class.quiz-option--wrong]="
            revealed() && selectedOptionId() === option.id && option.id !== currentQuestion.correctId
          "
          (click)="onSelect(option.id)"
        >
          <span class="quiz-option-badge">{{ optionLetters[i] }}</span>
          <span class="quiz-option-label">{{ option.label }}</span>
        </button>
      }
    </div>

    <div class="quiz-timer">
      <div class="quiz-timer-number">{{ timeLeft() }}</div>
    </div>

    @if (revealed()) {
      <div class="quiz-feedback" [class.quiz-feedback--correct]="selectedOptionId() === currentQuestion.correctId">
        {{ feedbackText() }}
      </div>
    }
  }

  <button
    class="quiz-next-btn"
    type="button"
    data-ui="next-question-btn"
    [disabled]="!revealed()"
    (click)="onNext()"
  >
    {{ isLastQuestion() ? 'Finish' : 'Next' }}
  </button>
</div>
