<div class="card-match-page" data-page="card-match">
  <div class="card-match-content">
    <div class="card-match-header" data-section="header">
      <button class="card-match-back-btn" type="button" data-ui="back-btn" (click)="onBack()">Back</button>
    </div>

    <h1 class="card-match-title">The architect</h1>
    <p class="card-match-subtitle">Match clue cards to correct answers</p>

    <div class="card-match-grid" data-section="card-grid">
      @for (idx of [0, 1, 2, 3, 4, 5]; track idx) {
        <div class="card-match-card">
          Card {{ idx + 1 }}
        </div>
      }
    </div>

    <div class="card-match-footer">
      <button type="button" class="card-match-next-btn" data-ui="next-btn" (click)="onFinish()">
        Finish
      </button>
    </div>
  </div>
</div>
