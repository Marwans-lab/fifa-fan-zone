<section class="results-page page-in" data-page="results">
  <div class="results-status">{{ statusLabel() }}</div>
  <div class="results-title">{{ quizTitle }}</div>
  <div class="results-score">{{ score }} / {{ total }}</div>
  <p class="results-points">Total points: {{ store.state().points }}</p>

  <div class="results-actions">
    <button
      type="button"
      class="results-btn results-btn--primary"
      data-ui="view-leaderboard-btn"
      (click)="onViewLeaderboard()"
    >
      View leaderboard
    </button>
    <button
      type="button"
      class="results-btn results-btn--secondary"
      data-ui="return-home-btn"
      (click)="onReturnHome()"
    >
      Return home
    </button>
  </div>
</section>
