<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" width="750" height="400">
  <defs>
    <linearGradient id="bg-s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A0D"/>
      <stop offset="50%" stop-color="#002E14"/>
      <stop offset="100%" stop-color="#000F08"/>
    </linearGradient>
    <linearGradient id="arch-s" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00A152"/>
    </linearGradient>
    <linearGradient id="grass-s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004D1A"/>
      <stop offset="50%" stop-color="#00691F"/>
      <stop offset="100%" stop-color="#004D1A"/>
    </linearGradient>
    <radialGradient id="floodlight-l" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floodlight-r" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-s">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="750" height="400" fill="url(#bg-s)"/>

  <!-- Stadium structure - outer shell -->
  <ellipse cx="375" cy="240" rx="320" ry="100" fill="none" stroke="#00A152" stroke-width="2" opacity="0.4"/>
  <ellipse cx="375" cy="235" rx="270" ry="82" fill="none" stroke="#00E676" stroke-width="1.5" opacity="0.3"/>

  <!-- Stadium arch / roof -->
  <path d="M80,240 Q375,20 670,240" fill="none" stroke="#00E676" stroke-width="3" opacity="0.8"/>
  <path d="M115,240 Q375,55 635,240" fill="none" stroke="#00A152" stroke-width="2" opacity="0.6"/>
  <path d="M150,240 Q375,90 600,240" fill="none" stroke="#004D1A" stroke-width="1.5" opacity="0.8"/>

  <!-- Roof support struts -->
  <line x1="180" y1="240" x2="240" y2="90" stroke="#00E676" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="240" x2="290" y2="58" stroke="#00E676" stroke-width="1.5" opacity="0.4"/>
  <line x1="310" y1="240" x2="345" y2="32" stroke="#00E676" stroke-width="1.5" opacity="0.4"/>
  <line x1="375" y1="240" x2="375" y2="22" stroke="#00E676" stroke-width="1.5" opacity="0.4"/>
  <line x1="440" y1="240" x2="405" y2="32" stroke="#00E676" stroke-width="1.5" opacity="0.4"/>
  <line x1="510" y1="240" x2="460" y2="58" stroke="#00E676" stroke-width="1.5" opacity="0.4"/>
  <line x1="570" y1="240" x2="510" y2="90" stroke="#00E676" stroke-width="1.5" opacity="0.4"/>

  <!-- Seating tiers -->
  <path d="M120,240 Q375,160 630,240" fill="none" stroke="#00691F" stroke-width="4" opacity="0.7"/>
  <path d="M155,240 Q375,180 595,240" fill="none" stroke="#005516" stroke-width="3" opacity="0.6"/>
  <path d="M190,240 Q375,200 560,240" fill="none" stroke="#004010" stroke-width="2" opacity="0.5"/>

  <!-- Football pitch -->
  <rect x="175" y="275" width="400" height="85" rx="4" fill="url(#grass-s)" opacity="0.9"/>
  <!-- Pitch markings -->
  <rect x="195" y="285" width="360" height="65" rx="2" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="375" y1="285" x2="375" y2="350" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <circle cx="375" cy="318" r="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <circle cx="375" cy="318" r="2" fill="white" opacity="0.5"/>
  <!-- Centre circle arc on left -->
  <path d="M215,285 L215,310 Q230,318 215,326 L215,350" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <path d="M535,285 L535,310 Q520,318 535,326 L535,350" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>

  <!-- Floodlight beams (left) -->
  <ellipse cx="155" cy="280" rx="80" ry="160" fill="url(#floodlight-l)" transform="rotate(-20, 155, 280)"/>
  <!-- Floodlight beams (right) -->
  <ellipse cx="595" cy="280" rx="80" ry="160" fill="url(#floodlight-r)" transform="rotate(20, 595, 280)"/>

  <!-- Floodlight masts -->
  <line x1="130" y1="390" x2="160" y2="100" stroke="#00E676" stroke-width="2.5" opacity="0.6"/>
  <circle cx="160" cy="100" r="5" fill="#00E676" opacity="0.8"/>
  <line x1="620" y1="390" x2="590" y2="100" stroke="#00E676" stroke-width="2.5" opacity="0.6"/>
  <circle cx="590" cy="100" r="5" fill="#00E676" opacity="0.8"/>

  <!-- Title -->
  <text x="375" y="360" font-family="sans-serif" font-size="22" font-weight="700" fill="#00E676" opacity="0.95" text-anchor="middle" letter-spacing="3">STADIUM KNOWLEDGE</text>
  <text x="375" y="382" font-family="sans-serif" font-size="11" fill="#00A152" opacity="0.8" text-anchor="middle" letter-spacing="2">FIFA 2026 VENUES QUIZ</text>
</svg>
