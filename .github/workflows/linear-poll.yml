name: Pipeline Poller — Unstick all stalled issues

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  unstick:
    runs-on: ubuntu-latest
    steps:
      - name: Poll Linear and fix stuck issues
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # --- Helper: Linear GraphQL ---
          gql() {
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"$1\"}"
          }

          transition() {
            local issue_uuid=$1 state_id=$2
            gql "mutation { issueUpdate(id: \\\"$issue_uuid\\\", input: { stateId: \\\"$state_id\\\" }) { success } }" > /dev/null
          }

          comment() {
            local issue_uuid=$1 body=$2
            gql "mutation { commentCreate(input: { issueId: \\\"$issue_uuid\\\", body: \\\"$body\\\" }) { success } }" > /dev/null
          }

          echo "=== Pipeline Poller $(date -u +%H:%M:%S) ==="

          # --- Fetch team + all workflow states ---
          TEAM_DATA=$(gql "{ teams(filter: { key: { eq: \\\"MAR\\\" } }) { nodes { id } } }")
          TEAM_ID=$(echo "$TEAM_DATA" | jq -r '.data.teams.nodes[0].id // empty')
          if [ -z "$TEAM_ID" ]; then
            echo "MAR team not found. Exiting."
            exit 0
          fi

          STATES_DATA=$(gql "{ team(id: \\\"$TEAM_ID\\\") { states { nodes { id name } } } }")
          get_state_id() {
            echo "$STATES_DATA" | jq -r --arg n "$1" '.data.team.states.nodes[] | select(.name == $n) | .id // empty'
          }

          IN_PROGRESS_ID=$(get_state_id "In Progress")
          IN_REVIEW_ID=$(get_state_id "In Review")
          DEPLOYING_ID=$(get_state_id "Deploying")
          DEPLOYED_ID=$(get_state_id "Deployed")

          echo "States: InProgress=$IN_PROGRESS_ID InReview=$IN_REVIEW_ID Deploying=$DEPLOYING_ID Deployed=$DEPLOYED_ID"

          # --- Fetch all open PRs once ---
          OPEN_PRS=$(gh pr list --repo "$REPO" --state open --json number,title,headRefName --limit 100)

          find_pr() {
            echo "$OPEN_PRS" | jq -r --arg id "$1" '.[] | select(.title | contains($id)) | .number' | head -1
          }

          # ============================================================
          # STAGE 1: In Progress + has open PR → move to In Review
          # ============================================================
          if [ -n "$IN_PROGRESS_ID" ] && [ -n "$IN_REVIEW_ID" ]; then
            PROGRESS_ISSUES=$(gql "{ issues(filter: { team: { id: { eq: \\\"$TEAM_ID\\\" } }, state: { id: { eq: \\\"$IN_PROGRESS_ID\\\" } } }) { nodes { id identifier } } }")
            PROGRESS_COUNT=$(echo "$PROGRESS_ISSUES" | jq '.data.issues.nodes | length')
            echo ""
            echo "--- In Progress: $PROGRESS_COUNT issues ---"

            echo "$PROGRESS_ISSUES" | jq -r '.data.issues.nodes[] | "\(.id) \(.identifier)"' | while read -r UUID IDENT; do
              PR=$(find_pr "$IDENT")
              if [ -n "$PR" ] && [ "$PR" != "null" ]; then
                echo "$IDENT: Has open PR #$PR → moving to In Review"
                transition "$UUID" "$IN_REVIEW_ID"
                comment "$UUID" "**[PIPELINE]** Open PR #$PR detected. Auto-moving to In Review."
              fi
            done
          fi

          # ============================================================
          # STAGE 2: In Review + open PR → move to Deploying
          # Cursor validates internally during development.
          # ============================================================
          if [ -n "$IN_REVIEW_ID" ] && [ -n "$DEPLOYING_ID" ]; then
            REVIEW_ISSUES=$(gql "{ issues(filter: { team: { id: { eq: \\\"$TEAM_ID\\\" } }, state: { id: { eq: \\\"$IN_REVIEW_ID\\\" } } }) { nodes { id identifier } } }")
            REVIEW_COUNT=$(echo "$REVIEW_ISSUES" | jq '.data.issues.nodes | length')
            echo ""
            echo "--- In Review: $REVIEW_COUNT issues ---"

            echo "$REVIEW_ISSUES" | jq -r '.data.issues.nodes[] | "\(.id) \(.identifier)"' | while read -r UUID IDENT; do
              PR=$(find_pr "$IDENT")
              if [ -n "$PR" ] && [ "$PR" != "null" ]; then
                echo "$IDENT: Has open PR #$PR → moving to Deploying"
                transition "$UUID" "$DEPLOYING_ID"
                comment "$UUID" "**[PIPELINE]** PR #$PR ready. Auto-moving to Deploying for merge."
              else
                echo "$IDENT: In Review but no open PR — skipping (middleware stall detector handles)"
              fi
            done
          fi

          # ============================================================
          # STAGE 3: Deploying + has open PR → merge it
          # Cursor will validate GitHub Pages before moving to Deployed.
          # ============================================================
          if [ -n "$DEPLOYING_ID" ]; then
            DEPLOYING_ISSUES=$(gql "{ issues(filter: { team: { id: { eq: \\\"$TEAM_ID\\\" } }, state: { id: { eq: \\\"$DEPLOYING_ID\\\" } } }) { nodes { id identifier } } }")
            DEPLOYING_COUNT=$(echo "$DEPLOYING_ISSUES" | jq '.data.issues.nodes | length')
            echo ""
            echo "--- Deploying: $DEPLOYING_COUNT issues ---"

            echo "$DEPLOYING_ISSUES" | jq -r '.data.issues.nodes[] | "\(.id) \(.identifier)"' | while read -r UUID IDENT; do
              PR=$(find_pr "$IDENT")
              if [ -n "$PR" ] && [ "$PR" != "null" ]; then
                echo "$IDENT: Merging PR #$PR..."
                # Un-draft first if needed — Cursor always opens draft PRs
                IS_DRAFT=$(gh pr view "$PR" --repo "$REPO" --json isDraft --jq '.isDraft' 2>/dev/null || echo "false")
                if [ "$IS_DRAFT" = "true" ]; then
                  echo "$IDENT: PR #$PR is a draft — marking ready for review"
                  gh pr ready "$PR" --repo "$REPO" 2>/dev/null || true
                  sleep 2
                fi
                if gh pr merge "$PR" --repo "$REPO" --squash --delete-branch; then
                  echo "$IDENT: PR #$PR merged — waiting for GitHub Pages deploy..."
                  DEPLOYED=false
                  DEPLOY_FAILED=false
                  FAILED_RUN_URL=""
                  for i in $(seq 1 30); do
                    sleep 10
                    RUN_DATA=$(gh run list --repo "$REPO" --workflow deploy.yml --limit 1 \
                      --json status,conclusion,url 2>/dev/null || echo "[]")
                    STATUS=$(echo "$RUN_DATA" | jq -r '.[0].status // "unknown"')
                    CONCLUSION=$(echo "$RUN_DATA" | jq -r '.[0].conclusion // "unknown"')
                    RUN_URL=$(echo "$RUN_DATA" | jq -r '.[0].url // ""')
                    echo "$IDENT: deploy.yml attempt $i: $STATUS / $CONCLUSION"
                    if [ "$STATUS" = "completed" ]; then
                      if [ "$CONCLUSION" = "success" ]; then
                        DEPLOYED=true
                      else
                        DEPLOY_FAILED=true
                        FAILED_RUN_URL="$RUN_URL"
                      fi
                      break
                    fi
                  done
                  if [ "$DEPLOY_FAILED" = "true" ]; then
                    echo "$IDENT: Deploy failed — resetting to Todo"
                    TODO_ID=$(gql "{ workflowStates(filter: { team: { id: { eq: \\\"$TEAM_ID\\\" } }, name: { eq: \\\"Todo\\\" } }) { nodes { id } } }" \
                      | jq -r '.data.workflowStates.nodes[0].id // empty')
                    FAIL_BODY="**[DEPLOY FAILED]** PR #$PR was merged but GitHub Pages deployment failed.\\\\n\\\\n${FAILED_RUN_URL:+[View failed run]($FAILED_RUN_URL)\\\\n\\\\n}Resetting to **Todo** — please fix the build error and re-open a PR."
                    gql "mutation { commentCreate(input: { issueId: \\\"$UUID\\\", body: \\\"$FAIL_BODY\\\" }) { success } }" > /dev/null
                    [ -n "$TODO_ID" ] && gql "mutation { issueUpdate(id: \\\"$UUID\\\", input: { stateId: \\\"$TODO_ID\\\" }) { success } }" > /dev/null
                  else
                    # deploy.yml succeeded (or timed out) — move directly to Deployed
                    if [ "$DEPLOYED" = "true" ]; then
                      echo "$IDENT: Deploy confirmed — moving to Deployed"
                      DONE_MSG="**[PIPELINE]** PR #$PR merged and GitHub Pages deployed successfully. Moving to **Deployed**."
                    else
                      echo "$IDENT: Deploy timed out — moving to Deployed optimistically"
                      DONE_MSG="**[PIPELINE]** PR #$PR merged. Deploy timed out waiting, but marking **Deployed** — check the site if needed."
                    fi
                    gql "mutation { commentCreate(input: { issueId: \\\"$UUID\\\", body: \\\"$DONE_MSG\\\" }) { success } }" > /dev/null
                    [ -n "$DEPLOYED_ID" ] && gql "mutation { issueUpdate(id: \\\"$UUID\\\", input: { stateId: \\\"$DEPLOYED_ID\\\" }) { success } }" > /dev/null
                    echo "$IDENT: Moved to Deployed."
                  fi
                else
                  echo "$IDENT: Merge failed, trying to update branch first..."
                  if gh api -X PUT "repos/$REPO/pulls/$PR/update-branch" -f update_method=merge 2>/dev/null; then
                    echo "$IDENT: Branch updated, will retry merge on next poll cycle"
                  else
                    echo "$IDENT: Branch update failed (conflicts). Needs manual rebase."
                    comment "$UUID" "**[PIPELINE]** PR #$PR has merge conflicts with main. Needs rebase before it can be merged."
                  fi
                fi
              else
                # No open PR — check if already merged
                if [ -n "$DEPLOYED_ID" ]; then
                  MERGED_PR=$(gh pr list --repo "$REPO" --state merged --json number,title --limit 20 | \
                    jq -r --arg id "$IDENT" '.[] | select(.title | contains($id)) | .number' | head -1)
                  if [ -n "$MERGED_PR" ] && [ "$MERGED_PR" != "null" ]; then
                    echo "$IDENT: PR #$MERGED_PR already merged — Cursor will validate deployment"
                    comment "$UUID" "**[PIPELINE]** PR #$MERGED_PR already merged. Awaiting Cursor deployment validation."
                  else
                    # No PR at all — check if parent is Deployed
                    PARENT_STATE=$(gql "{ issue(id: \\\"$IDENT\\\") { parent { state { name } } } }" | \
                      jq -r '.data.issue.parent.state.name // empty')
                    if [ "$PARENT_STATE" = "Deployed" ] || [ "$PARENT_STATE" = "Deploying" ]; then
                      echo "$IDENT: Sub-issue, parent is $PARENT_STATE → moving to Deployed"
                      transition "$UUID" "$DEPLOYED_ID"
                      comment "$UUID" "**[PIPELINE]** Sub-issue — parent already $PARENT_STATE. Auto-moving to Deployed."
                    else
                      echo "$IDENT: No PR found and no deployed parent. Skipping."
                    fi
                  fi
                fi
              fi
            done
          fi

          echo ""
          echo "=== Poller complete ==="
